---
apiVersion: v1
kind: ConfigMap
metadata:
  name: amd-network-operator-device-plugin-config
  namespace: openshift-amd-network
  labels:
    app.kubernetes.io/component: amd-network
    app.kubernetes.io/part-of: amd-network
data:
  config.json: |
    {
      "resourceList": [
        {
          "resourceName": "nic",
          "resourcePrefix": "amd.com",
          "enableExporterHealthCheck": true,
          "selectors": {
            "vendors": ["1dd8"],
            "devices": ["1002"],
            "drivers": ["ionic"],
            "isRdma": false
          },
          "excludeTopology": false
        },
        {
          "resourceName": "vnic",
          "resourcePrefix": "amd.com",
          "enableExporterHealthCheck": true,
          "selectors": {
            "vendors": ["1dd8"],
            "devices": ["1003"],
            "drivers": ["ionic"],
            "isRdma": false
          },
          "excludeTopology": false
        }
      ]
    }

# ---
# AMD Device Plugin Configuration for hnic_pf1_vf8 Profile
# ---
#
# IMPORTANT: This ConfigMap overrides the default AMD Network Operator device plugin
# configuration to set `isRdma: false` for both NIC and VNIC resources.
#
# Why isRdma: false?
# -----------------
# The hnic_pf1_vf8 profile (Host NIC mode) does NOT expose RDMA resources via
# /sys/bus/pci/devices/*/infiniband, unlike the default profile which uses
# device_config_rdma_1x400G.
#
# With isRdma: true (the upstream default), the device plugin checks for RDMA
# resources and skips NICs that don't have them. This causes 0 NICs to be
# registered when using hnic profiles.
#
# Profile Comparison:
# -------------------
# - default:        device_config_rdma_1x400G     -> isRdma: true  ✓
# - pf1_vf1:        device_config_pf1_vf1_llc     -> isRdma: true  ✓
# - hnic_pf1_vf8:   device_config_pf1_vf8_hnic    -> isRdma: false ✓
#
# After applying this ConfigMap, restart the device plugin pods:
#   oc delete pods -n openshift-amd-network -l app=amd-network-device-plugin
#
# Expected Result:
# ----------------
# oc get nodes -ojson | jq '.items[].status.allocatable | with_entries(select(.key | contains("amd.com")))'
# {
#   "amd.com/gpu": "8",
#   "amd.com/nic": "7"    # <-- Should show 7 (was 0 before fix)
# }
#
# References:
# -----------
# - https://github.com/pensando/network-operator/blob/main/bundle/manifests/device-plugin-configmap.yaml
# - Upstream default uses isRdma: true for both nic and vnic
# - For RDMA-enabled profiles (default), use isRdma: true
# - For Host NIC profiles (hnic*), use isRdma: false

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: amd-network-operator-device-plugin-config
  namespace: openshift-amd-network
data:
  config.json: |
    {
      "resourceList": [
        {
          "resourceName": "nic",
          "resourcePrefix": "amd.com",
          "enableExporterHealthCheck": true,
          "selectors": {
            "vendors": ["1dd8"],
            "devices": ["1002"],
            "drivers": ["ionic"],
            "isRdma": false
          },
          "excludeTopology": false
        },
        {
          "resourceName": "vnic",
          "resourcePrefix": "amd.com",
          "enableExporterHealthCheck": true,
          "selectors": {
            "vendors": ["1dd8"],
            "devices": ["1003"],
            "drivers": ["ionic"],
            "isRdma": false
          },
          "excludeTopology": false
        }
      ]
    }

# ---
# AMD Device Plugin Configuration
# ---
#
# IMPORTANT: This ConfigMap is required for the AMD Network Operator device plugin
# to properly detect and register AMD Pensando AI NICs.
#
# Why isRdma: false?
# ------------------
# The upstream default uses isRdma: true, which works for RDMA-enabled profiles
# (default, pf1_vf1) where NICs expose RDMA resources via /sys/class/infiniband/.
# However, the hnic_pf1_vf8 profile does NOT expose RDMA resources, so the device
# plugin filters out all NICs and registers 0 devices (amd.com/nic: 0).
#
# Setting isRdma: false relaxes the filter — the device plugin registers NICs
# regardless of RDMA capability. This is safe because:
# - isRdma is a registration filter, not an RDMA enabler
# - Nodes with RDMA-capable profiles still have full RDMA at the driver level
# - This allows mixed-profile clusters (e.g., pf1_vf1 on one node, hnic_pf1_vf8
#   on another) to work with a single cluster-wide ConfigMap
#
# Note: The AMD network-operator does not support per-node device plugin configs,
# so isRdma must be the same across all nodes.
#
# Profile Comparison:
# -------------------
# - default:        device_config_rdma_1x400G     -> isRdma: true  works, but false also works
# - pf1_vf1:        device_config_pf1_vf1_llc     -> isRdma: true  works, but false also works
# - hnic_pf1_vf8:   device_config_pf1_vf8_hnic    -> isRdma: false required
#
# Without this ConfigMap:
# -----------------------
# The AMD Network Operator does NOT automatically create a device plugin ConfigMap.
# Device plugin pods will fail to start with:
#   MountVolume.SetUp failed for volume "device-plugin-config-volume" :
#   configmap "amd-network-operator-device-plugin-config" not found
#
# After applying this ConfigMap, restart the device plugin pods if already running:
#   oc delete pods -n openshift-amd-network -l app.kubernetes.io/name=device-plugin
#
# Expected Result:
# ----------------
# oc get nodes -ojson | jq '.items[].status.allocatable | with_entries(select(.key | contains("amd.com")))'
# {
#   "amd.com/gpu": "8",
#   "amd.com/nic": "7",    # <-- Physical Functions (PFs)
#   "amd.com/vnic": "0"    # <-- Virtual Functions (VFs) - requires SR-IOV policy to activate
# }
#
# References:
# -----------
# - https://github.com/pensando/network-operator/blob/main/bundle/manifests/device-plugin-configmap.yaml
# - Upstream default uses isRdma: true for both nic and vnic

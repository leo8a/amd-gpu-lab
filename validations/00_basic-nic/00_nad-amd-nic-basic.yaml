---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: amd-nic-basic
  namespace: openshift-amd-network
  annotations:
    k8s.v1.cni.cncf.io/resourceName: amd.com/nic
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "amd-nic-basic",
      "plugins": [
        {
          "type": "host-device"
        }
      ]
    }

# Use case: Maximum performance, dedicated NIC per pod
# Pod annotation: k8s.v1.cni.cncf.io/networks: amd-nic-basic
# Resource request: amd.com/nic: "1"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: amd-network-operator-device-plugin-config
  namespace: openshift-amd-network
data:
  config.json: |
    {
      "resourceList": [
        {
          "resourceName": "nic",
          "resourcePrefix": "amd.com",
          "enableExporterHealthCheck": true,
          "selectors": {
            "vendors": ["1dd8"],
            "devices": ["1002"],
            "drivers": ["ionic"],
            "isRdma": false
          },
          "excludeTopology": false
        },
        {
          "resourceName": "vnic",
          "resourcePrefix": "amd.com",
          "enableExporterHealthCheck": true,
          "selectors": {
            "vendors": ["1dd8"],
            "devices": ["1003"],
            "drivers": ["ionic"],
            "isRdma": false
          },
          "excludeTopology": false
        }
      ]
    }

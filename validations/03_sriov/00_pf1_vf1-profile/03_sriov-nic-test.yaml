---
apiVersion: v1
kind: Pod
metadata:
  name: test-amd-sriov
  namespace: openshift-amd-network
  annotations:
    k8s.v1.cni.cncf.io/networks: amd-vnic-network
spec:
  containers:
  - name: test
    image: registry.access.redhat.com/ubi9/ubi:latest
    command: ["/bin/bash", "-c", "sleep infinity"]
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
        openshift.io/vnic: "1"
      limits:
        cpu: 100m
        memory: 100Mi
        openshift.io/vnic: "1"
  nodeSelector:
    feature.node.kubernetes.io/amd-nic: "true"

---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - 00_amd-network-cs.yaml
  - 01_amd-network-ns.yaml
  - 02_amd-network-og.yaml
  - 03_amd-network-sub.yaml
  - 04_amd-ionic-blacklist.yaml
  # - 05_rdma-namespace-mode.yaml
  - 06_amd-networkconfig.yaml
  - 07_amd-device-plugin-config.yaml


# -----------------------------------------------------------------------------
# Operator Releases
# -----------------------------------------------------------------------------
patches:
  - target:
      kind: CatalogSource
      name: amd-network-operators
    patch: |-
      - op: replace
        path: /spec/image
        value: quay.io/lochoa/rocm/amd-network-operator-catalog:main

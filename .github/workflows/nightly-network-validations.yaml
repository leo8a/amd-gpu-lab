name: network-operator (nightly validations)

on:
  schedule:
    - cron: "0 3 * * *"  # 4am CET
  workflow_dispatch:
    inputs:
      stages:
        description: "Comma-separated stages (0=cluster, 1=basic, 2=rdma, 3=sriov) or 'all'"
        required: false
        default: "all"
      sriov_profile:
        description: "SR-IOV profile for stage 3"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - pf1_vf1
          - hnic_pf1_vf8
          - skip

concurrency:
  group: network-validations
  cancel-in-progress: false

env:
  NAMESPACE: openshift-amd-network
  VALIDATIONS_DIR: vendor/amd/network-operator/validations
  LOG_DIR: /tmp/validation-logs

jobs:
  preflight:
    runs-on: self-hosted
    timeout-minutes: 2
    outputs:
      stages: ${{ steps.plan.outputs.stages }}
      sriov_profile: ${{ steps.plan.outputs.sriov_profile }}
    steps:
      - name: Check cluster connectivity
        run: |
          set -euo pipefail
          oc whoami
          oc version
          oc get nodes
          NODE_COUNT=$(oc get nodes -l feature.node.kubernetes.io/amd-nic=true --no-headers | wc -l)
          echo "AMD NIC nodes: $NODE_COUNT"
          if [[ $NODE_COUNT -lt 1 ]]; then
            echo "::error::No AMD NIC nodes found"
            exit 1
          fi
          mkdir -p "$LOG_DIR"

      - name: Verify device plugin resources
        run: |
          set -euo pipefail
          if ! oc get cm -n "$NAMESPACE" amd-network-operator-device-plugin-config &>/dev/null; then
            echo "::error::Device plugin ConfigMap missing — apply it with: oc apply -f validations/03_sriov/00_pf1_vf1-profile/00_amd-device-plugin-config.yaml"
            exit 1
          fi

          NIC_TOTAL=$(oc get nodes -l feature.node.kubernetes.io/amd-nic=true \
            -o jsonpath='{range .items[*]}{.status.allocatable.amd\.com/nic}{"\n"}{end}' \
            | awk '{s+=$1} END {print s+0}')
          echo "Total amd.com/nic allocatable: $NIC_TOTAL"
          if [[ "$NIC_TOTAL" -lt 1 ]]; then
            echo "::error::No amd.com/nic resources — device plugin may need a restart (oc delete pods -n $NAMESPACE -l app.kubernetes.io/name=device-plugin)"
            exit 1
          fi

      - name: Determine stages to run
        id: plan
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            STAGES_TO_RUN="${{ inputs.stages }}"
            SRIOV_PROFILE="${{ inputs.sriov_profile }}"
          else
            STAGES_TO_RUN="0,1,2,4"
            SRIOV_PROFILE="pf1_vf1"
          fi

          echo "stages=$STAGES_TO_RUN" >> "$GITHUB_OUTPUT"
          echo "sriov_profile=$SRIOV_PROFILE" >> "$GITHUB_OUTPUT"
          echo "Stages: $STAGES_TO_RUN | SR-IOV profile: $SRIOV_PROFILE"

  cluster-validation:
    needs: preflight
    if: contains(needs.preflight.outputs.stages, '0')
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Run validation
        run: .github/scripts/run-network-validation.sh 0

  basic-nic:
    needs: [preflight, cluster-validation]
    if: >-
      always()
      && contains(needs.preflight.outputs.stages, '1')
      && (needs.cluster-validation.result == 'success' || needs.cluster-validation.result == 'skipped')
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run validation
        run: .github/scripts/run-network-validation.sh 1

  rdma-single-pod:
    needs: [preflight, basic-nic]
    if: >-
      always()
      && contains(needs.preflight.outputs.stages, '2')
      && (needs.basic-nic.result == 'success' || needs.basic-nic.result == 'skipped')
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run validation
        run: .github/scripts/run-network-validation.sh 2

  rdma-multi-node:
    needs: [preflight, basic-nic]
    if: >-
      always()
      && contains(needs.preflight.outputs.stages, '2')
      && (needs.basic-nic.result == 'success' || needs.basic-nic.result == 'skipped')
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run validation
        run: .github/scripts/run-network-validation.sh 3

  sriov-pf1-vf1:
    needs: [preflight, rdma-single-pod, rdma-multi-node]
    if: >-
      always()
      && contains(needs.preflight.outputs.stages, '3')
      && (needs.preflight.outputs.sriov_profile == 'all' || needs.preflight.outputs.sriov_profile == 'pf1_vf1')
      && (needs.rdma-single-pod.result == 'success' || needs.rdma-single-pod.result == 'skipped')
      && (needs.rdma-multi-node.result == 'success' || needs.rdma-multi-node.result == 'skipped')
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run validation
        run: .github/scripts/run-network-validation.sh 4

  sriov-hnic:
    needs: [preflight, rdma-single-pod, rdma-multi-node]
    if: >-
      always()
      && contains(needs.preflight.outputs.stages, '3')
      && (needs.preflight.outputs.sriov_profile == 'all' || needs.preflight.outputs.sriov_profile == 'hnic_pf1_vf8')
      && (needs.rdma-single-pod.result == 'success' || needs.rdma-single-pod.result == 'skipped')
      && (needs.rdma-multi-node.result == 'success' || needs.rdma-multi-node.result == 'skipped')
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run validation
        run: .github/scripts/run-network-validation.sh 5

  cleanup:
    needs: [preflight, cluster-validation, basic-nic, rdma-single-pod, rdma-multi-node, sriov-pf1-vf1, sriov-hnic]
    if: always()
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Upload validation logs
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs-${{ github.run_id }}
          path: /tmp/validation-logs/
          retention-days: 30
          if-no-files-found: ignore

      - name: Final safety cleanup
        run: |
          set -uo pipefail
          echo "Running belt-and-suspenders cleanup..."
          for dir in 00_cluster-validation 01_basic/00_nic-assignment 02_rdma/00_single-pod \
                     02_rdma/01_multi-node 03_sriov/00_pf1_vf1-profile 03_sriov/01_hnic_pf1_vf8-profile; do
            oc delete -k "${VALIDATIONS_DIR}/$dir" --ignore-not-found=true 2>/dev/null || true
          done
          oc label nodes --all \
            amd.com/cluster-validation-status- \
            amd.com/cluster-validation-candidate- \
            amd.com/gpu-validation-test- \
            2>/dev/null || true
          echo "Cleanup complete"

# Validates DRA full-GPU allocation: creates a ResourceClaimTemplate for a single AMD GPU
# via the gpu.amd.com DeviceClass, then runs rocm-smi inside a workload pod to confirm
# the GPU is visible and healthy.
#
# NOTE: The DeviceClass is created automatically by the operator when DRA is enabled.
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - 00_resourceclaimtemplate.yaml
  - 01_dra-full-gpu-test.yaml
